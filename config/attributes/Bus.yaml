meta:
  use_case_id: Bus
attribute_set:
  search:
    context:
      location:
        country:
          code:
            _description:
              required: true
              usage: IND
              info: Describes country code as per ISO 3166-1 and ISO 3166-2 format
              owner: BAP
              type: enum
              enums:
                - code: IND
                  description: Represents the country
                  reference: <PR/Issue/Discussion Links md format text>
          _description:
            required: false
            usage: ""
            info: The country this location is or is located within; the BAP specifies this in search to define the geographic market scope.
            owner: BAP
            type: object
        city:
          code:
            _description:
              required: true
              usage: "*"
              info: Describes the city code this location is, or is located within
              owner: BAP
              type: enum
              enums:
                - code: std:080
                  description: Bangalore
                  reference: <PR/Issue/Discussion Links md format text>
          _description:
            required: false
            usage: ""
            info: The BAP includes this location object in the search to specify the city scope of available services.
            owner: BAP
            type: object
        _description:
          required: false
          usage: ""
          info: The BAP specifies the location where goods or services are intended to be fulfilled, enabling the BPP to assess service availability and fulfillment feasibility at that area.
          owner: BAP
          type: object
      domain:
        _description:
          required: true
          usage: ONDC:FIS13
          info: Describes domain code that is relevant to this transaction context
          owner: BAP
          type: enum
          enums:
            - code: ONDC:TRV11
              description: mobility domain Public Transit
              reference: <PR/Issue/Discussion Links md format text>
      timestamp:
        _description:
          required: true
          usage: 2023-03-23T04:41:16Z
          info: Describes tme of request generation in RFC3339 format
          owner: BAP
          type: string
      bap_id:
        _description:
          required: true
          usage: fis.test.bap.io
          info: Describes subscriber ID of the BAP
          owner: BAP
          type: string
      transaction_id:
        _description:
          required: true
          usage: 6743e9e2
          info: Describes  a unique value which persists across all API calls
          owner: BAP
          type: string
      message_id:
        _description:
          required: true
          usage: 13ba8018f176
          info: Describes a unique value which persists during a request / callback cycle.
          owner: BAP
          type: string
      version:
        _description:
          required: true
          usage: 2.0.0
          info: Describes the version of transaction protocol being used by the sender.
          owner: BAP
          type: integer
      action:
        _description:
          required: true
          usage: search
          info: Describes the Beckn protocol method being called by the sender and executed at the receiver.
          owner: BAP
          type: enum
          enums:
            - code: search
              description: Buyer app indicates the search intent
              reference: <PR/Issue/Discussion Links md format text>
      bap_uri:
        _description:
          required: true
          usage: https://fis.test.bap.io/
          info: Describes subscriber URL of the BAP for accepting callbacks from BPPs.
          owner: BAP
          type: string
      ttl:
        _description:
          required: true
          usage: PT30S
          info: Describes the duration in ISO8601 format after timestamp for which this message holds valid
          owner: BAP
          type: string
      bpp_id:
        _description:
          required: false
          usage: fis.test.bpp.io
          info: Describes subscriber ID of the BPP
          owner: BPP
          type: string
      bpp_uri:
        _description:
          required: false
          usage: https://fis.test.bpp.io/
          info: Describes subscriber URL of the BPP for accepting calls from BAPs.
          owner: BPP
          type: string
      _description:
        required: false
        usage: ""
        info: The BAP mints the context in search to establish the transaction envelope containing demographic and geographic scope, participant routing information, protocol metadata, and transaction identifiers (transaction_id, message_id, timestamp, ttl) required for the BPP to process and correlate the request.
        owner: BAP
        type: object
    message:
      intent:
        fulfillment:
          stops:
            type:
              _description:
                required: false
                usage: START
                info: A logical point in space and time during the fulfillment of an order.
                owner: BAP
                type: enum
                enums:
                  - code: START
                    description: Describes the initial fulfillment location.
                    reference: <PR/Issue/Discussion Links md format text
                  - code: END
                    description: Describes the final fulfillment location.
                    reference: <PR/Issue/Discussion Links md format text
                  - code: INTERMEDIATE_STOP
                    description: Describes the intermediate stops during fulfillment.
                    reference: <PR/Issue/Discussion Links md format text
                  - code: TRANSIT_STOP
                    description: Describes the transit stops during fulfillment.
                    reference: <PR/Issue/Discussion Links md format text
            location:
              gps:
                _description:
                  required: false
                  usage: 28.666576, 77.233332
                  info: Describes a GPS coordinate
                  owner: BAP
                  type: string
              descriptor:
                code:
                  _description:
                    required: false
                    usage: KASHMERE_GATE
                    info: Physical description of code.
                    owner: BAP
                    type: string
                _description:
                  required: false
                  usage: ""
                  info: A human-readable description of the fulfillment stop location, which may represent either the pickup origin or delivery destination. The BAP includes this to help the BPP accurately identify and service the specified location.
                  owner: BAP
                  type: object
              _description:
                required: false
                usage: ""
                info: The geographic location(s) of fulfillment stops that the BAP specifies to be serviced or visited during order fulfillment. This enables the BPP to assess service capability and determine routing feasibility for the requested waypoints.
                owner: BAP
                type: object
            _description:
              required: false
              usage: ""
              info: Ordered list of logical stops the BAP specifies for the intended fulfillment during search; BPPs use this to identify matching routes.
              owner: BAP
              type: object
          vehicle:
            category:
              _description:
                required: true
                usage: BUS
                info: Describes category of a vehicle
                owner: BAP
                type: enum
                enums:
                  - code: BUS
                    description: Describes the vehicle category as Bus
                    reference: <PR/Issue/Discussion Links md format text
                  - code: METRO
                    description: Describes the vehicle category as Metro
                    reference: <PR/Issue/Discussion Links md format text
            _description:
              required: false
              usage: ""
              info: The BAP specifies the vehicle in the search intent to indicate the transportation mode and characteristics needed for order fulfillment.
              owner: BAP
              type: object
          _description:
            required: false
            usage: ""
            info: The BAP provides fulfillment details in this container during search to help the BPP return matching fulfillment options.
            owner: BAP
            type: object
        payment:
          tags:
            BUYER_FINDER_FEES:
              _description:
                required: true
                usage: --
                info: Describes Buyer finder fee
                owner: BAP
                type: string
            SETTLEMENT_TERMS:
              _description:
                required: true
                usage: --
                info: Describes settlement terms
                owner: BAP
                type: string
            _description:
              required: false
              usage: ""
              info: The BAP includes tags to track and categorize payment metadata specific to metro transportation services.
              owner: BAP
              type: object
            descriptor:
              code:
                _description:
                  required: false
                  usage: BUYER_FINDER_FEES
                  info: The code that identifies the payment tag descriptor in the BAP's search request. This code specifies the particular payment scheme or method category being queried.
                  owner: BAP
                  type: string
              _description:
                required: false
                usage: ""
                info: (empty — no descriptive signal from openapi, existing_leaf, or referenced_in; container role unspecified in evidence)
                owner: BAP
                type: object
            display:
              _description:
                required: false
                usage: "false"
                info: Specifies whether payment tags should be displayed in the search results. Set to true to include payment tags, or false to exclude them.
                owner: BAP
                type: boolean
            list:
              descriptor:
                code:
                  _description:
                    required: false
                    usage: BUYER_FINDER_FEES_PERCENTAGE
                    info: The BAP specifies the code for the payment tag descriptor to identify which payment configuration or method category to search for. The BPP uses this code to match and return relevant payment options.
                    owner: BAP
                    type: string
                _description:
                  required: false
                  usage: ""
                  info: The descriptor that defines the structure and properties of all payment tags included in the BAP's search request.
                  owner: BAP
                  type: object
              value:
                _description:
                  required: false
                  usage: "2.5"
                  info: The value of the payment tag referenced by its code in descriptor.code, which the BAP specifies to filter or define payment method preferences during search.
                  owner: BAP
                  type: string
              _description:
                required: false
                usage: ""
                info: A list of tags that the BAP specifies to filter payment options and communicate payment preferences or requirements in the search. These tags enable the BPP to understand and respond with relevant payment offerings aligned with the BAP's needs.
                owner: BAP
                type: object
          _description:
            required: false
            usage: ""
            info: The BAP includes payment method details to indicate payment requirements that BPPs should consider in their search response.
            owner: BAP
            type: object
          collected_by:
            _description:
              required: false
              usage: BAP
              info: "BAP declares its payment collection preference: 'bap' if BAP will collect and remit to BPP, or 'bpp' if BPP will collect directly. When BAP requests 'bap', the BPP should not provide a payment URL if accepting those terms."
              owner: BAP
              type: string
        _description:
          required: false
          usage: ""
          info: The BAP declares the consumer's search intent here, specifying what they want (product or service), who they want it from, where and when they need it, and how they prefer to pay, so BPPs can identify matching offerings.
          owner: BAP
          type: object
      _description:
        required: false
        usage: ""
        info: The BAP places search intent and criteria within the message to initiate discovery of matching products or services from the catalog. The message conveys the specific search parameters that guide the BPP in identifying and returning relevant items.
        owner: BAP
        type: object
    _description:
      required: false
      usage: --
      info: <placeholder description>
      owner: BAP
      type: object
  on_search:
    context:
      location:
        country:
          code:
            _description:
              required: true
              usage: IND
              info: Describes country code as per ISO 3166-1 and ISO 3166-2 format
              owner: BAP
              type: enum
              enums:
                - code: IND
                  description: Represents the country
                  reference: <PR/Issue/Discussion Links md format text>
          _description:
            required: false
            usage: ""
            info: The country this location is or is located within; the BAP specifies this in search to define the geographic market scope.
            owner: BPP
            type: object
        city:
          code:
            _description:
              required: true
              usage: "*"
              info: Describes the city code this location is, or is located within
              owner: BAP
              type: enum
              enums:
                - code: std:080
                  description: Bangalore
                  reference: <PR/Issue/Discussion Links md format text>
          _description:
            required: false
            usage: ""
            info: The BAP includes this location object in the search to specify the city scope of available services.
            owner: BPP
            type: object
        _description:
          required: false
          usage: ""
          info: The BAP specifies the location where goods or services are intended to be fulfilled, enabling the BPP to assess service availability and fulfillment feasibility at that area.
          owner: BPP
          type: object
      domain:
        _description:
          required: true
          usage: ONDC:FIS13
          info: Describes domain code that is relevant to this transaction context
          owner: BAP
          type: enum
          enums:
            - code: ONDC:TRV11
              description: mobility domain Public Transit
              reference: <PR/Issue/Discussion Links md format text>
      timestamp:
        _description:
          required: true
          usage: 2023-03-23T04:41:16Z
          info: Describes tme of request generation in RFC3339 format
          owner: BAP
          type: string
      bap_id:
        _description:
          required: true
          usage: fis.test.bap.io
          info: Describes subscriber ID of the BAP
          owner: BAP
          type: string
      transaction_id:
        _description:
          required: true
          usage: 6743e9e2
          info: Describes  a unique value which persists across all API calls
          owner: BAP
          type: string
      message_id:
        _description:
          required: true
          usage: 13ba8018f176
          info: Describes a unique value which persists during a request / callback cycle.
          owner: BAP
          type: string
      version:
        _description:
          required: true
          usage: 2.0.0
          info: Describes the version of transaction protocol being used by the sender.
          owner: BAP
          type: integer
      action:
        _description:
          required: true
          usage: on_search
          info: Describes the Beckn protocol method being called by the sender and executed at the receiver.
          owner: BAP
          type: enum
          enums:
            - code: on_search
              description: Seller app provides catalog based on search intent.
              reference: <PR/Issue/Discussion Links md format text>
      bap_uri:
        _description:
          required: true
          usage: https://fis.test.bap.io/
          info: Describes subscriber URL of the BAP for accepting callbacks from BPPs.
          owner: BAP
          type: string
      ttl:
        _description:
          required: true
          usage: PT30S
          info: Describes the duration in ISO8601 format after timestamp for which this message holds valid
          owner: BAP
          type: string
      bpp_id:
        _description:
          required: true
          usage: fis.test.bpp.io
          info: Describes subscriber ID of the BPP
          owner: BPP
          type: string
      bpp_uri:
        _description:
          required: true
          usage: https://fis.test.bpp.io/
          info: Describes subscriber URL of the BPP for accepting calls from BAPs.
          owner: BPP
          type: string
      _description:
        required: false
        usage: ""
        info: The BAP mints the context in search to establish the transaction envelope containing demographic and geographic scope, participant routing information, protocol metadata, and transaction identifiers (transaction_id, message_id, timestamp, ttl) required for the BPP to process and correlate the request.
        owner: BPP
        type: object
    message:
      catalog:
        descriptor:
          name:
            _description:
              required: true
              usage: Transit Solutions
              info: Physical description of something.
              owner: BPP
              type: string
          images:
            url:
              _description:
                required: false
                usage: https://transitsolutions.in/logos/logo.ico
                info: URL to the image. This can be a data url or an remote url
                owner: BPP
                type: string
            size_type:
              _description:
                required: false
                usage: xs
                info: Size type of URL image
                owner: BPP
                type: string
            _description:
              required: false
              usage: ""
              info: Array of images in the catalog descriptor that the BPP returns in on_search for visual representation of the catalog.
              owner: BPP
              type: object
          _description:
            required: false
            usage: ""
            info: The descriptive metadata for the catalog being provided by the BPP in response to the search query. The BAP uses this information to display catalog details to the user in their search results interface.
            owner: BPP
            type: object
        providers:
          id:
            _description:
              required: true
              usage: I1
              info: Id of the provider
              owner: BPP
              type: string
          descriptor:
            name:
              _description:
                required: true
                usage: Delhi Transport Corporation
                info: Physical description of something.
                owner: BPP
                type: string
            images:
              url:
                _description:
                  required: false
                  usage: https://dtc.delhi.gov.in/sites/default/files/DTC/logo/dtc_logo_2.png
                  info: URL to the image. This can be a data url or an remote url
                  owner: BPP
                  type: string
              size_type:
                _description:
                  required: false
                  usage: xs
                  info: Size type of URL image
                  owner: BPP
                  type: string
              _description:
                required: false
                usage: ""
                info: Images representing the provider returned by the BPP in on_search, each provided as a data URL or remote URL.
                owner: BPP
                type: object
            _description:
              required: false
              usage: ""
              info: Contains the provider's identifying information and descriptive details, such as name and category. The BPP supplies one descriptor per provider in the catalog response to help the BAP understand and identify each provider's business and service offerings.
              owner: BPP
              type: object
          fulfillments:
            id:
              _description:
                required: true
                usage: F1
                info: Unique reference ID to the fulfillment of an order
                owner: BPP
                type: string
            type:
              _description:
                required: true
                usage: F1
                info: A code that describes the mode of fulfillment. This is typically set when there are multiple ways an order can be fulfilled.
                owner: BPP
                type: enum
                enums:
                  - code: ROUTE
                    description: Describes the type of fulfillment.
                    reference: <PR/Issue/Discussion Links md format text
                  - code: TRIP
                    description: Describes the type of fulfillment.
                    reference: <PR/Issue/Discussion Links md format text
                  - code: TICKET
                    description: Describes the type of fulfillment.
                    reference: <PR/Issue/Discussion Links md format text
            stops:
              type:
                _description:
                  required: true
                  usage: INTERMEDIATE_STOP
                  info: The type of stop. Allowed values of this property can be defined by the network policy.
                  owner: BPP
                  type: enum
                  enums:
                    - code: START
                      description: Describes the initial fulfillment location.
                      reference: <PR/Issue/Discussion Links md format text
                    - code: END
                      description: Describes the final fulfillment location.
                      reference: <PR/Issue/Discussion Links md format text
                    - code: INTERMEDIATE_STOP
                      description: Describes the intermediate stops during fulfillment.
                      reference: <PR/Issue/Discussion Links md format text
                    - code: TRANSIT_STOP
                      description: Describes the transit stops during fulfillment.
                      reference: <PR/Issue/Discussion Links md format text
              instructions:
                name:
                  _description:
                    required: false
                    usage: Stop 1
                    info: Instructions name that need to be followed at the stop
                    owner: BPP
                    type: string
                _description:
                  required: false
                  usage: ""
                  info: Instructions provided by the BPP for the fulfillment partner to follow when handling the shipment at a specific stop in the fulfillment route. These may include special handling requirements, delivery constraints, or location-specific guidelines.
                  owner: BPP
                  type: object
                short_desc:
                  _description:
                    required: false
                    usage: Change for Pink Line
                    info: The BPP's brief description of operational or customer-relevant instructions applicable at the fulfillment stop, which the BAP uses to communicate pertinent guidance to the consumer for that waypoint.
                    owner: BPP
                    type: string
              location:
                descriptor:
                  code:
                    _description:
                      required: true
                      usage: INDIRA_GANDHI_TECHNICAL_UNIV
                      info: Physical description of something.
                      owner: BPP
                      type: string
                  name:
                    _description:
                      required: true
                      usage: Indira Gandhi Technical Unviversity
                      info: Physical description of something.
                      owner: BPP
                      type: string
                  _description:
                    required: false
                    usage: ""
                    info: The BPP provides a descriptive name or identifier for the stop location to help the BAP identify and display the specific pickup or drop-off point in metro or bus services. This enables the user to clearly understand where their transit journey begins or ends.
                    owner: BPP
                    type: object
                gps:
                  _description:
                    required: true
                    usage: 28.624097, 77.204991
                    info: The GPS co-ordinates of this location.
                    owner: BPP
                    type: string
                _description:
                  required: false
                  usage: ""
                  info: The BPP specifies the geographic location of the fulfillment stop as GPS coordinates or a station identifier. This allows the BAP to display and track the fulfillment route for the consumer.
                  owner: BPP
                  type: object
              id:
                _description:
                  required: false
                  usage: "1"
                  info: BPP publishes a unique identifier for each stop in its fulfillment network; BAP references these stop IDs when constructing fulfillment specifications in orders.
                  owner: BPP
                  type: string
              parent_stop_id:
                _description:
                  required: false
                  usage: "1"
                  info: Identifies the parent stop in the fulfillment plan; the BPP includes this in on_search.
                  owner: BPP
                  type: string
              _description:
                required: false
                usage: ""
                info: A list of stops provided for the fulfillment, which may include all available stops or a subset filtered according to the search request criteria. Each stop represents a pickup point, drop-off location, or waypoint along the fulfillment path.
                owner: BPP
                type: object
              authorization:
                type:
                  _description:
                    required: false
                    usage: QR_AND_VEHICLE_NUMBER
                    info: Specifies the authorization method required to initiate fulfillment operations at the stop. The BPP declares the verification type (such as OTP, password, or physical signature) needed before the fulfillment journey commences.
                    owner: BPP
                    type: string
                _description:
                  required: false
                  usage: ""
                  info: Specifies the type of authorization required at the fulfillment stop to complete the transaction. This indicates any regulatory, security, or access requirements applicable at that location that the BAP must satisfy.
                  owner: BPP
                  type: object
            vehicle:
              category:
                _description:
                  required: true
                  usage: BUS
                  info: Describes category of a vehicle
                  owner: BPP
                  type: enum
                  enums:
                    - code: BUS
                      description: Describes the vehicle category as Bus
                      reference: <PR/Issue/Discussion Links md format text
                    - code: METRO
                      description: Describes the vehicle category as Metro
                      reference: <PR/Issue/Discussion Links md format text
              _description:
                required: false
                usage: ""
                info: The BPP specifies the vehicle category for each fulfillment option in the search response.
                owner: BPP
                type: object
              variant:
                _description:
                  required: false
                  usage: NON_AC
                  info: Specifies the particular variant of the vehicle that the BPP will use to fulfill the delivery service.
                  owner: BPP
                  type: string
            tags:
              ROUTE_INFO:
                _description:
                  required: true
                  usage: --
                  info: Describes route info
                  owner: BPP
                  type: string
              _description:
                required: false
                usage: ""
                info: In on_search, the BPP returns tags for each fulfillment option to communicate fulfillment-specific metadata, policies, or capabilities that inform the BAP's selection decisions.
                owner: BPP
                type: object
              descriptor:
                code:
                  _description:
                    required: false
                    usage: ROUTE_INFO
                    info: The BPP specifies an enum code that classifies the fulfillment service type for this provider. This code is referenced throughout the ticket lifecycle to determine request handling workflows and routing logic.
                    owner: BPP
                    type: string
                _description:
                  required: false
                  usage: ""
                  info: The BPP provides fulfillment tag descriptors in the catalog to enable BAPs to identify and interpret the fulfillment service types and capabilities being offered.
                  owner: BPP
                  type: object
              list:
                descriptor:
                  code:
                    _description:
                      required: false
                      usage: ROUTE_ID
                      info: An enumerated value that identifies the specific type of fulfillment tag, enabling BAPs to programmatically interpret and apply its semantics. This standardized code classification allows systems to consistently recognize and utilize different fulfillment capabilities.
                      owner: BPP
                      type: string
                  _description:
                    required: false
                    usage: ""
                    info: A human-readable description that clarifies the purpose and scope of the fulfillment tag. This allows BAPs to understand the specific fulfillment capability being advertised by the BPP in the search response.
                    owner: BPP
                    type: object
                value:
                  _description:
                    required: false
                    usage: "242"
                    info: The value associated with the fulfillment tag descriptor code enumeration. This field contains the specific attribute or characteristic data that maps to the code specified in descriptor.code.
                    owner: BPP
                    type: string
                _description:
                  required: false
                  usage: ""
                  info: A list of tags that communicate fulfillment-level data and attributes. The BPP uses these tags to convey specific fulfillment capabilities, conditions, or features offered by the provider to the BAP.
                  owner: BPP
                  type: object
            _description:
              required: false
              usage: ""
              info: Fulfillment modes and associated logistics options available from the provider for items in this catalog. Each fulfillment specifies the delivery methods (such as home delivery, pickup, or parcel services) that customers can select during checkout.
              owner: BPP
              type: object
            customer:
              person:
                creds:
                  type:
                    _description:
                      required: false
                      usage: PAN
                      info: Specifies the type of credentials associated with the person booking the fulfillment, which determines the identity verification method and validation protocols applicable to the fulfillment transaction.
                      owner: BPP
                      type: string
                  _description:
                    required: false
                    usage: ""
                    info: Authentication or verification credentials required for the person booking the fulfillment, ensuring proper identity validation for ticket transactions.
                    owner: BPP
                    type: object
                _description:
                  required: false
                  usage: ""
                  info: Contains the details of the individual person responsible for booking or managing the fulfillment service in the BPP's search response. This allows the BAP to identify and contact the fulfillment representative when selecting fulfillment options.
                  owner: BPP
                  type: object
              _description:
                required: false
                usage: ""
                info: Contains customer attributes for the person using or booking the fulfillment service. Provides details specific to the end-user in the fulfillment context.
                owner: BPP
                type: object
          items:
            id:
              _description:
                required: false
                usage: I1
                info: ID of the item.
                owner: BPP
                type: string
            descriptor:
              code:
                _description:
                  required: false
                  usage: SJT
                  info: Physical description of something.
                  owner: BPP
                  type: enum
                  enums:
                    - code: SJT
                      description: Describes the kind of ticket Single Journey Ticket
                      reference: <PR/Issue/Discussion Links md format text
                    - code: SFSJT
                      description: Describes the kind of ticket special fair Single Journey Ticket
                      reference: <PR/Issue/Discussion Links md format text
                    - code: RJT
                      description: Describes the kind of ticket Return Journey Ticket
                      reference: <PR/Issue/Discussion Links md format text
                    - code: PASS
                      description: Describes the kind of ticket Pass (multiple use ticket)
                      reference: <PR/Issue/Discussion Links md format text
              name:
                _description:
                  required: false
                  usage: Single Journey Ticket
                  info: Physical description of something.
                  owner: BPP
                  type: string
              images:
                url:
                  _description:
                    required: false
                    usage: https://dtc.delhi.gov.in/sites/default/files/DTC/logo/dtc_logo_2.png
                    info: URL to the image. This can be a data url or an remote url
                    owner: BPP
                    type: string
