                required: false
                usage: ""
                info: In on_search, the BPP returns tags for each fulfillment option to communicate fulfillment-specific metadata, policies, or capabilities that inform the BAP's selection decisions.
                owner: BPP
                type: object
          items:
            id:
              _description:
                required: false
                usage: b2400168
                info: ID of the item.
                owner: BPP
                type: string
            descriptor:
