                _description:
                  required: false
                  usage: SJT
                  info: Describes the name for a particular item.
                  owner: BPP
                  type: string
              _description:
                required: false
                usage: --
                info: Describes the items description.
                owner: BPP
                type: object
            price:
              currency:
                _description:
                  required: false
                  usage: INR
                  info: Describes the price of a product or service
                  owner: BPP
                  type: string
              value:
                _description:
                  required: false
                  usage: 60
                  info: Describes the currency of a product or service
                  owner: BPP
                  type: string
              _description:
                required: false
                usage: --
                info: Describes the price of an item.
                owner: BPP
                type: object
            quantity:
              maximum:
                count:
                  _description:
                    required: false
                    usage: 6
                    info: This represents the maximum quantity allowed for purchase of the item
                    owner: BPP
                    type: integer
                _description:
                  required: false
                  usage: --
                  info: Describes the maximum quantity of an item.
                  owner: BPP
                  type: object
              minimum:
