                      owner: BPP
                      type: string
                  _description:
                    required: false
                    usage: ""
                    info: A human-readable description that clarifies the purpose and scope of the fulfillment tag. This allows BAPs to understand the specific fulfillment capability being advertised by the BPP in the search response.
                    owner: BPP
                    type: object
                value:
                  _description:
                    required: false
