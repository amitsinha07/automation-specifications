                name:
                  _description:
                    required: false
                    usage: Stop 2
                    info: Instructions name that need to be followed at the stop
                    owner: BPP
                    type: string
                short_desc:
                  _description:
                    required: false
                    usage: Please Change here for Yellow Line
                    info: short description of instructions that need to be followed at the stop
                    owner: BPP
                    type: string
                _description:
                  required: false
                  usage: ""
                  info: Instructions provided by the BPP for the fulfillment partner to follow when handling the shipment at a specific stop in the fulfillment route. These may include special handling requirements, delivery constraints, or location-specific guidelines.
                  owner: BPP
                  type: object
              location:
                descriptor:
                  code:
                    _description:
                      required: false
                      usage: KASHMERE_GATE
                      info: Describes the code for a particular location.
                      owner: BPP
                      type: string
                  name:
                    _description:
                      required: false
                      usage: Kashmere Gate
                      info: Describes the name for a particular location.
                      owner: BPP
                      type: string
                  _description:
                    required: false
                    usage: ""
                    info: The BPP provides a descriptive name or identifier for the stop location to help the BAP identify and display the specific pickup or drop-off point in metro or bus services. This enables the user to clearly understand where their transit journey begins or ends.
                    owner: BPP
                    type: object
                gps:
                  _description:
                    required: true
                    usage: 28.707358, 77.180910
                    info: The GPS co-ordinates of this location.
                    owner: BPP
                    type: string
                _description:
                  required: false
                  usage: ""
