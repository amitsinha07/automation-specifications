                  info: The BPP provides fulfillment tag descriptors in the catalog to enable BAPs to identify and interpret the fulfillment service types and capabilities being offered.
                  owner: BPP
                  type: object
              list:
                descriptor:
                  code:
                    _description:
                      required: false
                      usage: ROUTE_ID
